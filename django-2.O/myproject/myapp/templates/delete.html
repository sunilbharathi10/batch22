<!DOCTYPE html>
<html>
<head>
    <title>Delete Student</title>
</head>
<body>

    <h2>Delete Student</h2>

    <p>
        Are you sure you want to delete
        NAME:<strong>{{ s.name }}</strong>? <br><br>
        AGE:<strong>{{ s.age }}</strong>? <br><br>
        EMAIL:<strong>{{ s.email }}</strong>?<br><br>
        PASSWORD:<strong>{{ s.password }}</strong>?<br><br>
    </p>

    <form method="POST">
        {% csrf_token %}

        <button type="submit">Yes, Delete</button>

        <a href="/view/">
            <button type="button">Cancel</button>
        </a>
    </form>

</body>
</html>
