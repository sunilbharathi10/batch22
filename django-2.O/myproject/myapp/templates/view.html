<h2>Students</h2>

<a href="{% url 'add_student' %}">Add Student</a>

<table border="1">
<tr>
    <th>Name</th>
    <th>Email</th>
    <th>age</th>
    <th>Courses</th>
    <th>Action</th>
</tr>

{% for i in students %}
<tr>
    <td>{{ i.name }}</td>
    <td>{{ i.email }}</td>
    <td>{{i.age }}</td>
    <td>
        {% for c in i.courses.all %}
            {{ c.name }} ({{ c.duration }}) <br>
        {% endfor %}
    </td>
    <td>
        <a href="{% url 'update_student' i.id %}">Edit</a>
        <a href="{% url 'delete_student' i.id %}">Delete</a>
    </td>
</tr>
{% endfor %}
</table>
